version: "3.8"

# Swarm placement (19-node cluster). Node hostnames are FQDNs:
#   node-N.perfdebug.ragger-pg0.apt.emulab.net  (N = 0 .. 18)
#   node-0:  frontend
#   node-1:  compose-post-service
#   node-2:  home-timeline-service, home-timeline-redis
#   node-3:  user-timeline-service, user-timeline-mongodb, user-timeline-redis
#   node-4:  post-storage-service, post-storage-mongodb, post-storage-memcached
#   node-5:  user-service, user-mongodb, user-memcached
#   node-6:  social-graph-service, social-graph-mongodb, social-graph-redis
#   node-7:  media-service, media-mongodb, media-memcached
#   node-8:  url-shorten-service, url-shorten-mongodb, url-shorten-memcached
#   node-9:  text-service
#   node-10: unique-id-service
#   node-11: user-mention-service
#   node-12: cassandra, cassandra-schema
#   node-13: jaeger, jaeger-query
#   node-14: prometheus
#   node-15: grafana
#   node-16..18: spare (nginx-web-server and media-frontend are unused)
# Global on all nodes: node-exporter, otel-collector, pumba-chaos

# service-config.json uses 512 connections per downstream; default container nofile is 1024
x-sn-ulimits: &sn-ulimits
  nofile:
    soft: 65536
    hard: 65536

# BatchSpanProcessor tuning (opentelemetry-cpp >= 1.23 reads OTEL_BSP_* env vars).
x-sn-otel-bsp-env: &sn-otel-bsp-env
  OTEL_BSP_MAX_QUEUE_SIZE: "65536"
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "512"
  OTEL_BSP_SCHEDULE_DELAY: "500"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://172.17.0.1:4318/v1/traces"

# Reach the local otel-collector task via host-published OTLP (see otel-collector ports).
x-sn-extra-hosts: &sn-extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

# Swarm configs/secrets are distributed to every node by the manager at deploy time,
# avoiding host bind mounts that only exist on the machine running `stack deploy`.
x-sn-service-files: &sn-service-files
  <<: *sn-extra-hosts
  configs:
    - source: mongod_conf
      target: /social-network-microservices/config/mongod.conf
    - source: redis_conf
      target: /social-network-microservices/config/redis.conf
    - source: jaeger_config_yml
      target: /social-network-microservices/config/jaeger-config.yml
    - source: service_config_json
      target: /social-network-microservices/config/service-config.json
    - source: otel_collector_config_yml
      target: /social-network-microservices/config/otel-collector-config.yml
  secrets:
    - source: ca_pem
      target: /keys/CA.pem
    - source: server_crt
      target: /keys/server.crt
    - source: server_key
      target: /keys/server.key
    - source: server_pem
      target: /keys/server.pem

services:

  # Host PMU counters via --collector.perf. On each Swarm node, run once before deploy:
  #   sudo sysctl -w kernel.perf_event_paranoid=0
  node-exporter:
    image: prom/node-exporter:latest
    deploy:
      mode: global
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.perf"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON
    ports:
      - target: 9100
        published: 9100
        protocol: tcp
        mode: host

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    deploy:
      mode: global
    command: ["--config=/etc/otelcol-collector-config.yml"]
    configs:
      - source: otel_collector_config_yml
        target: /etc/otelcol-collector-config.yml
    volumes:
      - /:/hostfs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON
    ports:
      - target: 8889
        published: 8889
        protocol: tcp
        mode: host
      # Host-mode OTLP so services export to their local collector, not the Swarm VIP.
      - target: 4318
        published: 4318
        protocol: tcp
        mode: host
    depends_on:
      - jaeger
      - node-exporter
    environment:
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_COLLECTOR_PORT_HTTP=4318


  # Centralized tail-sampling collector. A SINGLE replica so every span of a
  # trace (forwarded by the per-node edge collectors, keyed by trace ID) lands
  # here and the tail_sampling processor sees the complete trace.
  otel-tailsampler:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-tailsampler
    restart: always
    command: ["--config=/etc/otelcol-tailsampler-config.yml"]
    configs:
      - source: otel_tailsampler_config_yml
        target: /etc/otelcol-tailsampler-config.yml
    depends_on:
      - jaeger
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.hostname == node-13.perfdebug.ragger-pg0.apt.emulab.net

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=1d"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_swarm_yml
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: host
    deploy:
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.hostname == node-14.perfdebug.ragger-pg0.apt.emulab.net
    depends_on:
      - otel-collector
      - node-exporter


  compose-post-service:
    depends_on:
      - jaeger
      - jaeger-query
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.hostname == node-1.perfdebug.ragger-pg0.apt.emulab.net
    command: ["ComposePostService"]
    hostname: compose-post-service
    image: varungohil/sn-services-otel:local-host-otel2
    ulimits: *sn-ulimits
    environment: *sn-otel-bsp-env
    <<: *sn-service-files

  home-timeline-redis:
