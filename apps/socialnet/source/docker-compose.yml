      #      - 6832:6832/udp
      #      - 5778:5778
      - 16686:16686
      # - 4317:4317
      # - 4318:4318
      #      - 14268:14268
      #      - 9411:9411
    restart: always
    # environment:
    #   - COLLECTOR_ZIPKIN_HTTP_PORT=9411

  frontend:
