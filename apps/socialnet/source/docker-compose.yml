  # otel-collector:
  #   image: otel/opentelemetry-collector:latest
  #   restart: always
  #   depends_on:
  #     jaeger-agent:
  #       condition: service_started
  #   volumes:
  #     - ./config/otel-collector-config.yml:/etc/otelcol-collector-config.yml
  #   ports:
  #     # - 1888:1888 # pprof extension
  #     # - 8888:8888 # Prometheus metrics exposed by the Collector
  #     # - 8889:8889 # Prometheus exporter metrics
  #     # - 13133:13133 # health_check extension
  #     # - 4317:4317 # OTLP gRPC receiver
  #     # - 4318:4318 # OTLP http receiver
  #     - 55679:55679 # zpages extension
    

  # Host PMU counters via --collector.perf. Before starting the stack:
  #   sudo sysctl -w kernel.perf_event_paranoid=0
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    pid: host
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.perf"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON
    ports:
      - "9100:9100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/otelcol-collector-config.yml"]
    volumes:
      - ./config/otel-collector-config.yml:/etc/otelcol-collector-config.yml
      - /:/hostfs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON
    ports:
      - "8889:8889"   # Prometheus scrape endpoint for OTel metrics
      - 55679:55679   # zpages extension
    depends_on:
      jaeger-agent:
        condition: service_started
      node-exporter:
        condition: service_started
    environment:
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_COLLECTOR_PORT_HTTP=4318

  # Centralized tail-sampling collector. The otel-collector forwards all spans
  # here (keyed by trace ID); tail_sampling decides keep/drop on full traces.
  otel-tailsampler:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-tailsampler
    restart: always
    command: ["--config=/etc/otelcol-tailsampler-config.yml"]
    volumes:
      - ./config/otel-tailsampler-config.yml:/etc/otelcol-tailsampler-config.yml
    depends_on:
      jaeger-agent:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=1d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
      node-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
