global:
  scrape_interval: 10s
  evaluation_interval: 10s

# node-exporter and otel-collector run in `mode: global` (one task per node) and
# publish their ports in `mode: host`, so each Swarm node is reachable at
# node-N.<suffix>:<port>. We scrape each node by hostname (instead of DNS SD on
# the overlay) so every series carries a stable, human-readable `node` label.
# This is what lets the agent filter metrics to a single node.
#
# Cluster: node-0 .. node-18 on perfdebug.ragger-pg0.apt.emulab.net.
# Keep this list in sync with the Swarm membership.
scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-0.perfdebug.ragger-pg0.apt.emulab.net:9100"]
        labels: {node: node-0}
      - targets: ["node-1.perfdebug.ragger-pg0.apt.emulab.net:9100"]
        labels: {node: node-1}
      - targets: ["node-2.perfdebug.ragger-pg0.apt.emulab.net:9100"]
        labels: {node: node-2}
      - targets: ["node-3.perfdebug.ragger-pg0.apt.emulab.net:9100"]
